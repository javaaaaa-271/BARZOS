services:
  - type: web
    name: baros
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python serve.py
    healthCheckPath: /
    envVars:
      - key: BAROS_SECRET_KEY
        generateValue: true
      - key: BAROS_USERNAME
        value: admin
      - key: BAROS_PASSWORD
        sync: false
      - key: BAROS_DEBUG
        value: "false"
      - key: BAROS_DB_PATH
        value: /var/data/baros.db
