services:
  - type: web
    name: baros
    env: python

    buildCommand: pip install -r requirements.txt
    startCommand: python serve.py
    healthCheckPath: /

    envVars:
      - key: BAROS_ENV
        value: production

      - key: BAROS_SECRET_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: BAROS_INTERNAL_ACCESS_PATH
        value: backstage

      - key: BAROS_DEBUG
        value: "false"

      - key: BAROS_COOKIE_SECURE
        value: "true"

      # Só usa no PRIMEIRO deploy se quiser importar SQLite
      - key: BAROS_SQLITE_IMPORT_PATH
        value: /var/data/baros.db
