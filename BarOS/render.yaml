services:
  - type: web
    name: baros
    env: python
    buildCommand: python -m pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --workers 2 --threads 4 --timeout 120 --graceful-timeout 30 --keep-alive 5 --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: BAROS_SECRET_KEY
        generateValue: true
      - key: BAROS_USERNAME
        value: admin
      - key: BAROS_PASSWORD
        sync: false
      - key: BAROS_OPERATOR_USERNAME
        value: operacao
      - key: BAROS_OPERATOR_PASSWORD
        sync: false
      - key: BAROS_INTERNAL_ACCESS_PATH
        value: backstage
      - key: BAROS_DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: BAROS_SQLITE_IMPORT_PATH
        value: /var/data/baros.db
